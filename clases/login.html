<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Iniciar sesión — Genios Creativos</title>
<link rel="icon" type="image/svg+xml" href="robotsin/favicon.svg">
<link rel="stylesheet" href="css/genios.css">
<link rel="stylesheet" href="css/juice.css">
<style>
  body.page-login { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 28px 18px; }

  .login-card {
    position: relative; z-index: 1; width: 100%; max-width: 440px;
    background: #fff; border: 2px solid var(--line); border-radius: var(--r-lg);
    padding: 40px 38px 34px; box-shadow: var(--shadow);
    animation: cardIn .5s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes cardIn { from { opacity: 0; transform: translateY(24px) scale(.97); } to { opacity: 1; transform: none; } }

  .login-brand { text-align: center; margin-bottom: 26px; }
  .login-robot {
    width: 112px; height: 112px; object-fit: contain; margin: 0 auto 14px; cursor: pointer;
    filter: drop-shadow(0 12px 18px rgba(0,0,0,.18)); animation: float 4s ease-in-out infinite; display: block;
  }
  @keyframes float { 0%,100%{ transform: translateY(0) rotate(-1.5deg) } 50%{ transform: translateY(-12px) rotate(1.5deg) } }
  .login-brand .name { font-family: var(--font-display); font-weight: 700; font-size: 27px; color: var(--ink); line-height: 1.05; }
  .login-brand .name span { color: var(--blue); }
  .login-brand .sub { font-weight: 700; font-size: 13px; color: var(--ink-3); margin-top: 5px; }

  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-weight: 800; font-size: 12px; letter-spacing: .06em; text-transform: uppercase; color: var(--ink-2); margin-bottom: 7px; }
  .form-input {
    width: 100%; background: #F7F9FF; border: 2px solid var(--line); border-radius: 14px;
    padding: 14px 16px; font-family: var(--font-body); font-weight: 600; font-size: 15px; color: var(--ink);
    outline: none; transition: border-color .18s, background .18s, box-shadow .18s;
  }
  .form-input::placeholder { color: var(--ink-3); font-weight: 600; }
  .form-input:focus { border-color: var(--blue); background: #fff; box-shadow: 0 0 0 4px rgba(47,123,246,.14); }
  .form-input.error-field { border-color: var(--red); background: color-mix(in srgb,var(--red) 6%,#fff); }

  .login-card .btn { width: 100%; justify-content: center; margin-top: 6px; }
  .login-card .btn .spinner { width: 16px; height: 16px; border: 3px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .forgot-link { display: block; width: 100%; text-align: center; margin-top: 16px; background: none; border: none; cursor: pointer; font-family: var(--font-body); font-weight: 700; font-size: 14px; color: var(--ink-3); transition: color .18s; }
  .forgot-link:hover { color: var(--blue); }

  .alert { border-radius: 14px; padding: 13px 16px; font-weight: 600; font-size: 14px; margin-bottom: 16px; display: none; align-items: flex-start; gap: 10px; line-height: 1.45; }
  .alert.show { display: flex; }
  .alert-error { background: color-mix(in srgb,var(--red) 9%,#fff); border: 2px solid color-mix(in srgb,var(--red) 32%,#fff); color: #C0392B; }
  .alert-success { background: color-mix(in srgb,var(--green) 10%,#fff); border: 2px solid color-mix(in srgb,var(--green) 34%,#fff); color: #1B7A47; }
  .alert-icon { font-size: 17px; flex-shrink: 0; }

  .divider { border: none; border-top: 2px solid var(--line); margin: 24px 0 18px; }
  .login-footer { text-align: center; font-weight: 700; font-size: 12px; color: var(--ink-3); margin-top: 22px; }
  .login-foot-link { text-align: center; margin-top: 14px; font-weight: 700; font-size: 13px; }
  .login-foot-link a { color: var(--blue); }
  .login-foot-link a:hover { text-decoration: underline; }
</style>
</head>
<body class="page-login">

<div class="login-card">
  <div class="login-brand">
    <div class="mascot-stage" style="width:112px;height:112px;margin:0 auto 14px;">
      <img src="robotsin/robotsin_completo.png" alt="D-IA Vinci Robotsin" class="login-robot" onerror="this.style.display='none'">
    </div>
    <div class="name">Genios <span>Creativos</span></div>
    <div class="sub">¡Bienvenido de vuelta, genio! 🚀</div>
  </div>

  <div class="alert alert-error" id="error-alert">
    <span class="alert-icon">⚠️</span>
    <span id="error-msg">Correo o contraseña incorrectos. Inténtalo de nuevo.</span>
  </div>
  <div class="alert alert-success" id="success-alert">
    <span class="alert-icon">✉️</span>
    <span id="success-msg">Te enviamos un enlace para restablecer tu contraseña.</span>
  </div>

  <form id="login-form" novalidate>
    <div class="form-group">
      <label class="form-label" for="email">Correo electrónico</label>
      <input type="email" id="email" class="form-input" placeholder="tu@correo.com" autocomplete="email" required>
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Contraseña</label>
      <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn btn-lg" id="login-btn">▶ Entrar a la aventura</button>
  </form>

  <hr class="divider">
  <button class="forgot-link" id="forgot-btn">¿Olvidaste tu contraseña?</button>

  <div class="login-foot-link">¿Aún no tienes cuenta? <a href="landing.html">Conoce el curso →</a></div>
  <div class="login-footer">Academia Da Vinci IA · Solo para alumnos inscritos</div>
</div>

<script src="js/juice.js"></script>
<script>
const ES_PRODUCCION = /vercel\.app$|academiadavinci/.test(location.hostname);

function showError(msg){ document.getElementById('error-msg').textContent=msg; document.getElementById('error-alert').classList.add('show'); document.getElementById('success-alert').classList.remove('show'); }
function showSuccess(msg){ document.getElementById('success-msg').textContent=msg; document.getElementById('success-alert').classList.add('show'); document.getElementById('error-alert').classList.remove('show'); }
function hideAlerts(){ document.getElementById('error-alert').classList.remove('show'); document.getElementById('success-alert').classList.remove('show'); }
function setLoading(l){ const b=document.getElementById('login-btn'); if(l){ b.disabled=true; b.innerHTML='<span class="spinner"></span> Verificando...'; } else { b.disabled=false; b.innerHTML='▶ Entrar a la aventura'; } }

['email','password'].forEach(id => document.getElementById(id).addEventListener('input', () => { document.getElementById(id).classList.remove('error-field'); hideAlerts(); }));

if (ES_PRODUCCION) {
  // ── Producción: autenticación real con Supabase ──
  const add=(s,cb)=>{const e=document.createElement('script');e.src=s;if(cb)e.onload=cb;document.head.appendChild(e);};
  add('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js', () => {
    add('js/supabase-client.js', () => {
      const sb = window._supabase;
      sb.auth.getSession().then(({ data:{ session } }) => { if (session) location.href = 'index.html'; });

      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault(); hideAlerts();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        if (!email || !password) { showError('Por favor ingresa tu correo y contraseña.'); return; }
        setLoading(true);
        const { error } = await sb.auth.signInWithPassword({ email, password });
        setLoading(false);
        if (error) {
          const msgs = { 'Invalid login credentials':'Correo o contraseña incorrectos. Verifica tus datos.', 'Email not confirmed':'Debes confirmar tu correo antes de entrar. Revisa tu bandeja.', 'Too many requests':'Demasiados intentos. Espera unos minutos.' };
          showError(msgs[error.message] || ('Error al iniciar sesión: ' + error.message));
          document.getElementById('email').classList.add('error-field');
          document.getElementById('password').classList.add('error-field');
          return;
        }
        location.href = 'index.html';
      });

      document.getElementById('forgot-btn').addEventListener('click', async () => {
        const email = document.getElementById('email').value.trim();
        if (!email) { showError('Primero escribe tu correo arriba, luego haz clic aquí.'); document.getElementById('email').focus(); return; }
        const btn = document.getElementById('forgot-btn'); btn.textContent='Enviando...'; btn.disabled=true;
        const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: location.origin + '/clases/login.html' });
        btn.disabled=false; btn.textContent='¿Olvidaste tu contraseña?';
        if (error) showError('No pudimos enviar el correo: ' + error.message);
        else showSuccess('Te enviamos un enlace para restablecer tu contraseña. Revisa tu correo (y spam).');
      });
    });
  });
} else {
  // ── Vista previa: demostración sin backend ──
  document.getElementById('login-form').addEventListener('submit', (e) => {
    e.preventDefault(); hideAlerts();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) { showError('Por favor ingresa tu correo y contraseña.'); return; }
    setLoading(true);
    setTimeout(() => { setLoading(false); showSuccess('Vista previa de diseño ✓ — en producción esto te llevaría a tu aventura.'); if (window.GCConfetti) GCConfetti(30); }, 700);
  });
  document.getElementById('forgot-btn').addEventListener('click', () => {
    const email = document.getElementById('email').value.trim();
    if (!email) { showError('Primero escribe tu correo arriba, luego haz clic aquí.'); document.getElementById('email').focus(); return; }
    showSuccess('Vista previa ✓ — en producción enviaríamos el enlace a ' + email + '.');
  });
}
</script>

</body>
</html>
